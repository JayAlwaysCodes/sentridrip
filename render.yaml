services:
  - type: web
    name: sentridrip-backend
    runtime: node
    rootDir: sentridrip-app/backend
    buildCommand: npm install && cd ../.. && npm install && cd sentridrip-app/backend
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: NODE_ENV
        value: production
